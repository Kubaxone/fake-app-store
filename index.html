<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Store Clone</title>

<link rel="stylesheet" href="static/style.css">
</head>

<body>

<div class="nav">
  <h1>Today</h1>

  <div class="search-bar">
    <input id="search" placeholder="Search apps..." oninput="searchApps()">
  </div>
</div>

<div class="section">
  <div class="section-title">Top Apps</div>
  <div id="apps" class="apps-grid"></div>
</div>

<!-- INSTALL MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Installing...</h3>
    <p id="modal-sub">Please wait</p>
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
